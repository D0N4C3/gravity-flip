<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <!-- MOVING SPIKE - CEILING VARIANT (oscillates downward from ceiling) -->
  <!-- Electric yellow-green neon palette, mirrored from floor variant -->
  <defs>
    <filter id="msc-glow" x="-40%" y="-80%" width="180%" height="280%">
      <feGaussianBlur stdDeviation="2.5 3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="msc-track-glow" x="-80%" y="-20%" width="260%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="msc-spike-body" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#336600"/>
      <stop offset="60%" stop-color="#88DD00"/>
      <stop offset="100%" stop-color="#CCFF44"/>
    </linearGradient>
    <linearGradient id="msc-spike-body2" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#224400"/>
      <stop offset="60%" stop-color="#66AA00"/>
      <stop offset="100%" stop-color="#AAEE22"/>
    </linearGradient>
    <linearGradient id="msc-base" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#335500"/>
      <stop offset="100%" stop-color="#112200"/>
    </linearGradient>
    <linearGradient id="msc-track" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CCFF44" stop-opacity="0.0"/>
      <stop offset="60%" stop-color="#88DD00" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#CCFF44" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Ceiling base plate -->
  <rect x="0" y="0" width="80" height="8" fill="url(#msc-base)" opacity="0.85"/>
  <line x1="0" y1="8" x2="80" y2="8" stroke="#88DD00" stroke-width="1" opacity="0.8" filter="url(#msc-glow)"/>

  <!-- Motion track -->
  <line x1="40" y1="8" x2="40" y2="76" stroke="url(#msc-track)" stroke-width="1.5" filter="url(#msc-track-glow)" opacity="0.6"/>

  <!-- Ghost spikes - downward motion trail (fading upward toward ceiling) -->
  <polygon points="30,62 40,78 50,62" fill="#88DD00" opacity="0.08"/>
  <polygon points="30,54 40,70 50,54" fill="#88DD00" opacity="0.14"/>
  <polygon points="30,46 40,60 50,46" fill="#88DD00" opacity="0.22"/>

  <!-- Motion chevrons pointing downward -->
  <polyline points="35,20 40,26 45,20" fill="none" stroke="#AAEE22" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <polyline points="35,27 40,33 45,27" fill="none" stroke="#AAEE22" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <polyline points="35,34 40,40 45,34" fill="none" stroke="#88DD00" stroke-width="1.0" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>

  <!-- Side small spikes (static ceiling flankers, pointing down) -->
  <polygon points="8,8  16,28 24,8" fill="url(#msc-spike-body2)" filter="url(#msc-glow)"/>
  <polygon points="56,8 64,28 72,8" fill="url(#msc-spike-body2)" filter="url(#msc-glow)"/>

  <!-- Main center moving spike (shown at mid-travel, pointing down) -->
  <polygon points="26,8 40,44 54,8" fill="url(#msc-spike-body)" filter="url(#msc-glow)"/>

  <!-- Tip glow - main -->
  <circle cx="40" cy="44" r="3" fill="#FFFFFF" filter="url(#msc-glow)" opacity="0.95"/>
  <!-- Flanker tip glows -->
  <circle cx="16" cy="28" r="1.8" fill="#CCFF44" filter="url(#msc-glow)" opacity="0.8"/>
  <circle cx="64" cy="28" r="1.8" fill="#CCFF44" filter="url(#msc-glow)" opacity="0.8"/>

  <!-- Spike edge highlights -->
  <line x1="26" y1="8" x2="40" y2="44" stroke="#CCFF44" stroke-width="0.9" opacity="0.6"/>
  <line x1="8"  y1="8" x2="16" y2="28" stroke="#CCFF44" stroke-width="0.6" opacity="0.5"/>
  <line x1="56" y1="8" x2="64" y2="28" stroke="#CCFF44" stroke-width="0.6" opacity="0.5"/>

  <!-- Ceiling ambient glow -->
  <ellipse cx="40" cy="8" rx="36" ry="4" fill="#88DD00" opacity="0.13" filter="url(#msc-glow)"/>

  <!-- Speed sparks at tip -->
  <line x1="40" y1="46" x2="36" y2="52" stroke="#FFFFFF" stroke-width="0.6" opacity="0.5" stroke-linecap="round"/>
  <line x1="40" y1="46" x2="44" y2="52" stroke="#FFFFFF" stroke-width="0.6" opacity="0.5" stroke-linecap="round"/>
  <line x1="40" y1="46" x2="38" y2="54" stroke="#CCFF44" stroke-width="0.4" opacity="0.4" stroke-linecap="round"/>
</svg>
