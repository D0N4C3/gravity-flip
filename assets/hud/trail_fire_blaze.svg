<svg width="220" height="64" viewBox="0 0 220 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fb-core" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF2200" stop-opacity="0"/>
      <stop offset="30%" stop-color="#FF4500" stop-opacity="0.4"/>
      <stop offset="65%" stop-color="#FF8C00" stop-opacity="0.85"/>
      <stop offset="85%" stop-color="#FFD700" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="fb-outer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF2200" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF4500" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6600" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="fb-inner" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6600" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFB300" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="fb-glow" x="-10%" y="-150%" width="120%" height="400%">
      <feGaussianBlur stdDeviation="4 8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fb-soft" x="-5%" y="-100%" width="110%" height="300%">
      <feGaussianBlur stdDeviation="2 4"/>
    </filter>
    <filter id="fb-ember" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Deep outer fire aura -->
  <path d="M5 32 C40 32 80 28 120 32 C150 35 180 30 210 32" stroke="url(#fb-outer)" stroke-width="22" fill="none" filter="url(#fb-soft)" opacity="0.6"/>

  <!-- Mid flame body - undulating -->
  <path d="M15 32 C35 28 55 36 80 30 C100 25 120 36 145 30 C165 25 185 34 210 31" stroke="url(#fb-core)" stroke-width="9" fill="none" filter="url(#fb-glow)"/>

  <!-- Upper flame tongue -->
  <path d="M60 32 C75 22 90 28 110 24 C125 21 145 27 170 24 C185 22 200 28 210 30" stroke="url(#fb-core)" stroke-width="5" fill="none" opacity="0.6" filter="url(#fb-ember)"/>

  <!-- Lower flame tongue -->
  <path d="M70 32 C85 40 100 35 125 40 C145 44 170 38 200 36 C205 35 208 33 210 32" stroke="url(#fb-core)" stroke-width="4" fill="none" opacity="0.5" filter="url(#fb-ember)"/>

  <!-- Hot core beam -->
  <path d="M100 32 C130 32 160 31 210 32" stroke="url(#fb-inner)" stroke-width="3" fill="none"/>

  <!-- Bright tip -->
  <ellipse cx="208" cy="31" rx="8" ry="4" fill="#FFFFFF" opacity="0.9" filter="url(#fb-ember)"/>
  <ellipse cx="210" cy="31" rx="4" ry="2.5" fill="#FFD700" opacity="1"/>

  <!-- Embers (rising sparks) -->
  <circle cx="80" cy="22" r="1.2" fill="#FF6600" opacity="0.7" filter="url(#fb-ember)"/>
  <circle cx="100" cy="18" r="0.9" fill="#FFB300" opacity="0.6"/>
  <circle cx="118" cy="44" r="1" fill="#FF4500" opacity="0.5"/>
  <circle cx="135" cy="20" r="1.4" fill="#FFD700" opacity="0.7" filter="url(#fb-ember)"/>
  <circle cx="155" cy="42" r="0.8" fill="#FF6600" opacity="0.6"/>
  <circle cx="170" cy="19" r="1.2" fill="#FFB300" opacity="0.8" filter="url(#fb-ember)"/>
  <circle cx="185" cy="43" r="1" fill="#FF4500" opacity="0.5"/>
  <circle cx="198" cy="21" r="1.5" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="45" cy="24" r="0.8" fill="#FF8C00" opacity="0.4"/>
  <circle cx="65" cy="41" r="1" fill="#FF4500" opacity="0.4"/>

  <!-- Ember trails (micro streaks) -->
  <line x1="133" y1="22" x2="130" y2="18" stroke="#FFD700" stroke-width="0.7" opacity="0.6"/>
  <line x1="170" y1="21" x2="168" y2="16" stroke="#FFFFFF" stroke-width="0.6" opacity="0.5"/>
  <line x1="198" y1="23" x2="196" y2="18" stroke="#FFD700" stroke-width="0.8" opacity="0.7"/>
  <line x1="100" y1="20" x2="98" y2="15" stroke="#FF8C00" stroke-width="0.5" opacity="0.4"/>
</svg>
