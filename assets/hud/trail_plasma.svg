<svg width="200" height="64" viewBox="0 0 200 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Trail 1: Cyan plasma trail -->
    <linearGradient id="trail-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0"/>
      <stop offset="60%" stop-color="#00F5FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="trail-blur" x="0%" y="-100%" width="100%" height="300%">
      <feGaussianBlur stdDeviation="2 3"/>
    </filter>
    <filter id="glow-trail" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- === TRAIL 1: PLASMA STREAM === -->
  <g transform="translate(0,0)">
    <text x="8" y="10" font-family="monospace" font-size="6" fill="#00F5FF" opacity="0.5">PLASMA</text>

    <!-- Core trail beam -->
    <path d="M0 32 C30 32 60 28 100 32 C130 36 160 30 190 32" stroke="url(#trail-fade)" stroke-width="3" fill="none" filter="url(#glow-trail)"/>
    <!-- Wider glow -->
    <path d="M0 32 C30 32 60 28 100 32 C130 36 160 30 190 32" stroke="#00F5FF" stroke-width="8" fill="none" opacity="0.08" filter="url(#trail-blur)"/>
    <!-- Particles along trail -->
    <circle cx="20" cy="32" r="1.5" fill="#00F5FF" opacity="0.3"/>
    <circle cx="45" cy="30" r="1" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="70" cy="33" r="2" fill="#00F5FF" opacity="0.5"/>
    <circle cx="95" cy="31" r="1.5" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="120" cy="34" r="1" fill="#00F5FF" opacity="0.4"/>
    <circle cx="145" cy="31" r="2" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="170" cy="33" r="1.5" fill="#00F5FF" opacity="0.7"/>
    <!-- Micro sparks -->
    <path d="M50 30 L52 26 M54 34 L56 30" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5"/>
    <path d="M110 33 L112 29 M115 31 L117 27" stroke="#00F5FF" stroke-width="0.5" opacity="0.5"/>
    <path d="M160 30 L162 26 M165 34 L167 30" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5"/>
  </g>
</svg>

