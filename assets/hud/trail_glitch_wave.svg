<svg width="220" height="64" viewBox="0 0 220 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gw-r" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF003C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF003C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF003C" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="gw-g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00FF88" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00FF88" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="gw-b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00BFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00BFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="gw-white" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="70%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="1"/>
    </linearGradient>
    <filter id="gw-blur" x="-5%" y="-100%" width="110%" height="300%">
      <feGaussianBlur stdDeviation="1 2.5"/>
    </filter>
    <filter id="gw-glow" x="-10%" y="-150%" width="120%" height="400%">
      <feGaussianBlur stdDeviation="2 5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- RGB channel split — red offset up -->
  <line x1="10" y1="29" x2="208" y2="29" stroke="url(#gw-r)" stroke-width="2" opacity="0.7" filter="url(#gw-blur)"/>

  <!-- Green offset down -->
  <line x1="10" y1="35" x2="208" y2="35" stroke="url(#gw-g)" stroke-width="2" opacity="0.7" filter="url(#gw-blur)"/>

  <!-- Blue / core beam -->
  <line x1="5" y1="32" x2="210" y2="32" stroke="url(#gw-b)" stroke-width="2.5" filter="url(#gw-glow)"/>

  <!-- White core -->
  <line x1="80" y1="32" x2="210" y2="32" stroke="url(#gw-white)" stroke-width="1.2"/>

  <!-- Glitch horizontal bar artifacts (pixel corruption blocks) -->
  <rect x="28" y="30" width="18" height="3" fill="#FF003C" opacity="0.35"/>
  <rect x="28" y="33" width="14" height="2" fill="#00FF88" opacity="0.3"/>
  <rect x="62" y="31" width="22" height="2" fill="#00BFFF" opacity="0.4"/>
  <rect x="62" y="28" width="16" height="2" fill="#FF003C" opacity="0.3"/>
  <rect x="98" y="30" width="26" height="3" fill="#00FF88" opacity="0.35"/>
  <rect x="98" y="34" width="20" height="2" fill="#FF003C" opacity="0.3"/>
  <rect x="138" y="29" width="20" height="3" fill="#00BFFF" opacity="0.45"/>
  <rect x="138" y="33" width="16" height="2" fill="#00FF88" opacity="0.35"/>
  <rect x="168" y="30" width="24" height="3" fill="#FF003C" opacity="0.4"/>
  <rect x="168" y="28" width="18" height="2" fill="#FFFFFF" opacity="0.3"/>

  <!-- Scan line texture over artifacts -->
  <line x1="28" y1="30.5" x2="46" y2="30.5" stroke="#000000" stroke-width="0.4" opacity="0.3"/>
  <line x1="62" y1="31.5" x2="84" y2="31.5" stroke="#000000" stroke-width="0.4" opacity="0.3"/>
  <line x1="98" y1="31.5" x2="124" y2="31.5" stroke="#000000" stroke-width="0.4" opacity="0.3"/>
  <line x1="138" y1="30.5" x2="158" y2="30.5" stroke="#000000" stroke-width="0.4" opacity="0.25"/>
  <line x1="168" y1="31" x2="192" y2="31" stroke="#000000" stroke-width="0.4" opacity="0.25"/>

  <!-- Glitch notch cuts (signal dropout) -->
  <rect x="50" y="28" width="4" height="8" fill="#0D1117" opacity="0.8"/>
  <rect x="115" y="27" width="5" height="10" fill="#0D1117" opacity="0.8"/>
  <rect x="155" y="28" width="3" height="8" fill="#0D1117" opacity="0.75"/>

  <!-- Pixel blips — small bright squares -->
  <rect x="20" y="31" width="2" height="2" fill="#00FF88" opacity="0.7"/>
  <rect x="45" y="30" width="3" height="2" fill="#FF003C" opacity="0.6"/>
  <rect x="75" y="31" width="2" height="3" fill="#00BFFF" opacity="0.65"/>
  <rect x="93" y="30" width="3" height="2" fill="#FFFFFF" opacity="0.5"/>
  <rect x="131" y="31" width="2" height="2" fill="#00FF88" opacity="0.7"/>
  <rect x="162" y="30" width="3" height="3" fill="#FF003C" opacity="0.6"/>
  <rect x="187" y="31" width="2" height="2" fill="#FFFFFF" opacity="0.8"/>

  <!-- Tip burst — full RGB split -->
  <circle cx="207" cy="29" r="3" fill="#FF003C" opacity="0.6" filter="url(#gw-blur)"/>
  <circle cx="207" cy="35" r="3" fill="#00FF88" opacity="0.6" filter="url(#gw-blur)"/>
  <circle cx="208" cy="32" r="4" fill="#00BFFF" opacity="0.5" filter="url(#gw-blur)"/>
  <circle cx="209" cy="32" r="2.5" fill="#FFFFFF" opacity="1"/>

  <!-- Tip horizontal glitch streaks -->
  <rect x="200" y="30" width="14" height="1.5" fill="#FF003C" opacity="0.5"/>
  <rect x="198" y="33" width="16" height="1.5" fill="#00FF88" opacity="0.5"/>
</svg>
