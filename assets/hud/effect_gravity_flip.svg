<svg width="100" height="64" viewBox="0 0 100 64" xmlns="http://www.w3.org/2000/svg">
  <!-- GRAVITY FLIP EFFECT - mid-flip visual -->
  <defs>
    <filter id="flip-glow" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="3 4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="flip-soft" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <linearGradient id="flip-arc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#8800FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FF00AA" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Flip arc (the path of travel) -->
  <!-- Outer arc glow -->
  <path d="M10 52 C10 52 30 8 50 32 C70 56 90 12 90 12" fill="none" stroke="#8800FF" stroke-width="10" opacity="0.08" filter="url(#flip-soft)"/>

  <!-- Main arc -->
  <path d="M10 52 C10 52 30 8 50 32 C70 56 90 12 90 12" fill="none" stroke="url(#flip-arc)" stroke-width="2.5" filter="url(#flip-glow)" stroke-linecap="round"/>

  <!-- Particles along arc path -->
  <circle cx="10" cy="52" r="3" fill="#FF00AA" filter="url(#flip-glow)"/>
  <circle cx="22" cy="28" r="2.5" fill="#CC00FF" filter="url(#flip-glow)" opacity="0.8"/>
  <circle cx="36" cy="16" r="2" fill="#8800FF" filter="url(#flip-glow)" opacity="0.7"/>
  <circle cx="50" cy="32" r="3.5" fill="#6600FF" filter="url(#flip-glow)"/>
  <circle cx="64" cy="48" r="2" fill="#4400FF" filter="url(#flip-glow)" opacity="0.7"/>
  <circle cx="78" cy="22" r="2.5" fill="#0088FF" filter="url(#flip-glow)" opacity="0.8"/>
  <circle cx="90" cy="12" r="3" fill="#00F5FF" filter="url(#flip-glow)"/>

  <!-- Arrow at end (showing direction up) -->
  <path d="M84 18 L90 12 L96 18" fill="none" stroke="#00F5FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#flip-glow)"/>

  <!-- Speed lines (horizontal momentum) -->
  <path d="M0 32 L8 32" stroke="#00F5FF" stroke-width="1" opacity="0.5"/>
  <path d="M0 28 L6 28" stroke="#8800FF" stroke-width="0.8" opacity="0.4"/>
  <path d="M0 36 L6 36" stroke="#FF00AA" stroke-width="0.8" opacity="0.4"/>

  <!-- Electric crackle at pivot point (center) -->
  <path d="M50 32 L54 26 L50 30 L56 22" fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.7"/>
  <path d="M50 32 L46 26 L50 28 L44 22" fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.7"/>
  <path d="M50 32 L54 38 L50 34 L56 42" fill="none" stroke="#8800FF" stroke-width="0.8" opacity="0.5"/>
</svg>
