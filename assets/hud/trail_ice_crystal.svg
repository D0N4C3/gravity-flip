<svg width="220" height="64" viewBox="0 0 220 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ic-beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A8EDFF" stop-opacity="0"/>
      <stop offset="35%" stop-color="#C8F4FF" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#E8FAFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="ic-shard" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5EC8E5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#9EEEFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="ic-aura" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A8EDFF" stop-opacity="0"/>
      <stop offset="60%" stop-color="#A8EDFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#DAFAFF" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="ic-blur" x="-5%" y="-200%" width="110%" height="500%">
      <feGaussianBlur stdDeviation="3 7"/>
    </filter>
    <filter id="ic-crisp" x="-5%" y="-100%" width="110%" height="300%">
      <feGaussianBlur stdDeviation="1 2"/>
    </filter>
    <filter id="ic-frost" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- Cold outer aura -->
  <rect x="0" y="24" width="210" height="16" rx="8" fill="url(#ic-aura)" filter="url(#ic-blur)"/>

  <!-- Main beam -->
  <line x1="5" y1="32" x2="210" y2="32" stroke="url(#ic-beam)" stroke-width="3" filter="url(#ic-crisp)"/>
  <line x1="5" y1="32" x2="210" y2="32" stroke="url(#ic-beam)" stroke-width="1.5"/>

  <!-- Crystal shard spikes — upper -->
  <polygon points="55,32 62,20 65,32" fill="url(#ic-shard)" opacity="0.55"/>
  <polygon points="88,32 93,15 97,32" fill="url(#ic-shard)" opacity="0.65"/>
  <polygon points="118,32 124,17 128,32" fill="url(#ic-shard)" opacity="0.7"/>
  <polygon points="148,32 154,14 158,32" fill="url(#ic-shard)" opacity="0.8"/>
  <polygon points="174,32 180,12 184,32" fill="url(#ic-shard)" opacity="0.85"/>

  <!-- Crystal shard spikes — lower (mirror) -->
  <polygon points="55,32 62,44 65,32" fill="url(#ic-shard)" opacity="0.4"/>
  <polygon points="95,32 99,46 103,32" fill="url(#ic-shard)" opacity="0.5"/>
  <polygon points="130,32 136,48 140,32" fill="url(#ic-shard)" opacity="0.55"/>
  <polygon points="160,32 166,47 170,32" fill="url(#ic-shard)" opacity="0.65"/>

  <!-- Smaller filler shards -->
  <polygon points="72,32 75,24 78,32" fill="#C8F4FF" opacity="0.45"/>
  <polygon points="108,32 111,23 114,32" fill="#C8F4FF" opacity="0.5"/>
  <polygon points="140,32 143,22 146,32" fill="#DAFAFF" opacity="0.55"/>
  <polygon points="165,32 168,23 171,32" fill="#DAFAFF" opacity="0.6"/>

  <!-- Glowing tip burst -->
  <!-- Horizontal tip spike -->
  <line x1="195" y1="32" x2="216" y2="32" stroke="#FFFFFF" stroke-width="2.5" opacity="0.95"/>
  <!-- Tip cross shards -->
  <line x1="207" y1="22" x2="207" y2="42" stroke="#DAFAFF" stroke-width="1.2" opacity="0.7"/>
  <line x1="200" y1="25" x2="214" y2="39" stroke="#A8EDFF" stroke-width="0.8" opacity="0.5"/>
  <line x1="214" y1="25" x2="200" y2="39" stroke="#A8EDFF" stroke-width="0.8" opacity="0.5"/>
  <!-- Tip glow dot -->
  <circle cx="207" cy="32" r="4" fill="#FFFFFF" opacity="0.9" filter="url(#ic-frost)"/>
  <circle cx="207" cy="32" r="7" fill="#A8EDFF" opacity="0.3" filter="url(#ic-crisp)"/>

  <!-- Frost particle field -->
  <circle cx="25" cy="30" r="1" fill="#C8F4FF" opacity="0.3"/>
  <circle cx="40" cy="34" r="0.7" fill="#FFFFFF" opacity="0.25"/>
  <circle cx="70" cy="29" r="1.1" fill="#A8EDFF" opacity="0.4"/>
  <circle cx="85" cy="35" r="0.8" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="105" cy="28" r="1.2" fill="#C8F4FF" opacity="0.5"/>
  <circle cx="125" cy="35" r="0.9" fill="#DAFAFF" opacity="0.55"/>
  <circle cx="145" cy="29" r="1.3" fill="#A8EDFF" opacity="0.6"/>
  <circle cx="163" cy="35" r="1" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="183" cy="28" r="1.4" fill="#C8F4FF" opacity="0.7"/>
  <circle cx="197" cy="36" r="0.8" fill="#DAFAFF" opacity="0.75"/>

  <!-- Snowflake-like micro cross at two points -->
  <line x1="93" y1="28" x2="93" y2="36" stroke="#FFFFFF" stroke-width="0.5" opacity="0.4"/>
  <line x1="89" y1="32" x2="97" y2="32" stroke="#FFFFFF" stroke-width="0.5" opacity="0.4"/>
  <line x1="155" y1="26" x2="155" y2="38" stroke="#DAFAFF" stroke-width="0.5" opacity="0.5"/>
  <line x1="149" y1="32" x2="161" y2="32" stroke="#DAFAFF" stroke-width="0.5" opacity="0.5"/>
</svg>
