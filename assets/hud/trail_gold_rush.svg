<svg width="220" height="64" viewBox="0 0 220 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gr-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5E00" stop-opacity="0"/>
      <stop offset="25%" stop-color="#C8860A" stop-opacity="0.4"/>
      <stop offset="55%" stop-color="#E8A800" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#FFD700" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFACD" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="gr-shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0"/>
      <stop offset="60%" stop-color="#FFEE55" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="gr-aura" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8860B" stop-opacity="0"/>
      <stop offset="50%" stop-color="#DAA520" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="gr-glow" x="-10%" y="-200%" width="120%" height="500%">
      <feGaussianBlur stdDeviation="3 7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gr-soft" x="-5%" y="-100%" width="110%" height="300%">
      <feGaussianBlur stdDeviation="1.5 3"/>
    </filter>
    <filter id="gr-spark" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- Warm outer aura -->
  <rect x="0" y="23" width="210" height="18" rx="9" fill="url(#gr-aura)" filter="url(#gr-glow)"/>

  <!-- Mid glow layer -->
  <rect x="10" y="28" width="195" height="8" rx="4" fill="url(#gr-gold)" opacity="0.3" filter="url(#gr-soft)"/>

  <!-- Main molten gold beam -->
  <path d="M5 32 C40 30 80 34 120 31 C155 29 180 33 210 32" stroke="url(#gr-gold)" stroke-width="5" fill="none" filter="url(#gr-glow)"/>

  <!-- Bright highlight streak on top of beam -->
  <path d="M80 31 C120 29 160 30 205 31" stroke="url(#gr-shine)" stroke-width="1.8" fill="none"/>

  <!-- Undulating lower edge shimmer -->
  <path d="M50 34 C80 36 110 33 145 35 C170 37 190 34 210 33" stroke="#C8860A" stroke-width="2" fill="none" opacity="0.4" filter="url(#gr-spark)"/>

  <!-- Coin sparkle shapes (4-point stars) -->
  <!-- Star at ~80 -->
  <path d="M82 25 L83.5 28 L87 27 L84 29.5 L86 33 L82 31 L78 33 L80 29.5 L77 27 L80.5 28 Z" fill="#FFD700" opacity="0.75" filter="url(#gr-spark)"/>
  <!-- Star at ~115 -->
  <path d="M117 22 L118.5 25.5 L122 24.5 L119 27 L121 30.5 L117 28.5 L113 30.5 L115 27 L112 24.5 L115.5 25.5 Z" fill="#FFEE55" opacity="0.7" filter="url(#gr-spark)"/>
  <!-- Star at ~150 -->
  <path d="M152 24 L153.5 27 L157 26 L154.5 29 L156.5 32 L152 30 L147.5 32 L149.5 29 L147 26 L150.5 27 Z" fill="#FFD700" opacity="0.8" filter="url(#gr-spark)"/>
  <!-- Star at ~182 -->
  <path d="M183 21 L184.5 25 L188 24 L185 27 L187 31 L183 29 L179 31 L181 27 L178 24 L181.5 25 Z" fill="#FFFACD" opacity="0.85" filter="url(#gr-spark)"/>

  <!-- Mini coin-glint dots -->
  <circle cx="35" cy="31" r="1.5" fill="#C8860A" opacity="0.45"/>
  <circle cx="58" cy="33" r="1.2" fill="#DAA520" opacity="0.5"/>
  <circle cx="70" cy="30" r="1" fill="#FFD700" opacity="0.55"/>
  <circle cx="100" cy="33" r="1.4" fill="#FFEE55" opacity="0.6"/>
  <circle cx="135" cy="30" r="1.2" fill="#FFD700" opacity="0.65"/>
  <circle cx="165" cy="33" r="1.5" fill="#FFEE55" opacity="0.7"/>
  <circle cx="197" cy="31" r="1.3" fill="#FFFACD" opacity="0.8"/>

  <!-- Diagonal sparkle lines from stars -->
  <line x1="79" y1="24" x2="76" y2="21" stroke="#FFD700" stroke-width="0.7" opacity="0.6"/>
  <line x1="85" y1="24" x2="88" y2="21" stroke="#FFEE55" stroke-width="0.6" opacity="0.5"/>
  <line x1="114" y1="22" x2="111" y2="18" stroke="#FFD700" stroke-width="0.7" opacity="0.65"/>
  <line x1="120" y1="22" x2="123" y2="18" stroke="#FFFACD" stroke-width="0.6" opacity="0.55"/>
  <line x1="180" y1="21" x2="177" y2="17" stroke="#FFD700" stroke-width="0.8" opacity="0.7"/>
  <line x1="186" y1="21" x2="189" y2="17" stroke="#FFEE55" stroke-width="0.7" opacity="0.6"/>

  <!-- Glowing tip -->
  <ellipse cx="208" cy="32" rx="9" ry="5" fill="#FFD700" opacity="0.5" filter="url(#gr-soft)"/>
  <ellipse cx="209" cy="32" rx="5" ry="3" fill="#FFFACD" opacity="0.85" filter="url(#gr-spark)"/>
  <circle cx="210" cy="32" r="2.5" fill="#FFFFFF" opacity="1"/>
</svg>
