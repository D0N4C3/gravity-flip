<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- ROTATING BLADE OBSTACLE -->
  <defs>
    <filter id="blade-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="blade-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4400"/>
      <stop offset="50%" stop-color="#FF8800"/>
      <stop offset="100%" stop-color="#FFCC00"/>
    </linearGradient>
    <linearGradient id="blade-edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF4400" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="hub-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#FFCC00"/>
      <stop offset="100%" stop-color="#FF4400"/>
    </radialGradient>
  </defs>

  <!-- Motion blur rings -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#FF4400" stroke-width="0.5" opacity="0.15" stroke-dasharray="3 5"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#FF8800" stroke-width="0.5" opacity="0.2" stroke-dasharray="2 6"/>

  <!-- 4 blades at 0°, 90°, 180°, 270° -->
  <!-- Blade 0° (right) -->
  <path d="M32 32 L58 26 C60 24 60 22 58 20 L58 20 L32 28 Z" fill="url(#blade-grad)" filter="url(#blade-glow)"/>
  <path d="M32 28 L58 20" stroke="#FFFFFF" stroke-width="0.5" opacity="0.6"/>

  <!-- Blade 90° (down) -->
  <path d="M32 32 L38 58 C40 60 42 60 44 58 L44 58 L36 32 Z" fill="url(#blade-grad)" filter="url(#blade-glow)"/>
  <path d="M36 32 L44 58" stroke="#FFFFFF" stroke-width="0.5" opacity="0.6"/>

  <!-- Blade 180° (left) -->
  <path d="M32 32 L6 38 C4 40 4 42 6 44 L6 44 L32 36 Z" fill="url(#blade-grad)" filter="url(#blade-glow)"/>
  <path d="M32 36 L6 44" stroke="#FFFFFF" stroke-width="0.5" opacity="0.6"/>

  <!-- Blade 270° (up) -->
  <path d="M32 32 L26 6 C24 4 22 4 20 6 L20 6 L28 32 Z" fill="url(#blade-grad)" filter="url(#blade-glow)"/>
  <path d="M28 32 L20 6" stroke="#FFFFFF" stroke-width="0.5" opacity="0.6"/>

  <!-- Diagonal thin blades (45° offset for 8-blade look) -->
  <path d="M32 32 L52 12 C53 10 52 8 50 9 L32 29 Z" fill="#FF6600" opacity="0.5" filter="url(#blade-glow)"/>
  <path d="M32 32 L52 52 C54 53 56 52 55 50 L35 32 Z" fill="#FF6600" opacity="0.5" filter="url(#blade-glow)"/>
  <path d="M32 32 L12 52 C11 54 12 56 14 55 L32 35 Z" fill="#FF6600" opacity="0.5" filter="url(#blade-glow)"/>
  <path d="M32 32 L12 12 C10 11 8 12 9 14 L29 32 Z" fill="#FF6600" opacity="0.5" filter="url(#blade-glow)"/>

  <!-- Center hub -->
  <circle cx="32" cy="32" r="7" fill="url(#hub-grad)" filter="url(#blade-glow)"/>
  <circle cx="32" cy="32" r="4" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="32" cy="32" r="2" fill="#FF4400"/>

  <!-- Bolt holes on hub -->
  <circle cx="32" cy="27" r="1" fill="#FF4400"/>
  <circle cx="32" cy="37" r="1" fill="#FF4400"/>
  <circle cx="27" cy="32" r="1" fill="#FF4400"/>
  <circle cx="37" cy="32" r="1" fill="#FF4400"/>
</svg>
