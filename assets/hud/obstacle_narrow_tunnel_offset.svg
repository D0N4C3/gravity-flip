<svg width="64" height="120" viewBox="0 0 64 120" xmlns="http://www.w3.org/2000/svg">
  <!-- NARROW TUNNEL - OFFSET VARIANT (top-heavy block, passage along floor) -->
  <!-- Forces player to floor — neon blue/cyan with electric yellow warning -->
  <defs>
    <filter id="nto-glow" x="-30%" y="-20%" width="160%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="nto-edge-glow" x="-60%" y="-40%" width="220%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="nto-block" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#001122"/>
      <stop offset="35%" stop-color="#002244"/>
      <stop offset="65%" stop-color="#003366"/>
      <stop offset="100%" stop-color="#001122"/>
    </linearGradient>
    <linearGradient id="nto-danger-face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0066BB" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00CCFF" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="nto-stripe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#FF6600" stop-opacity="0.65"/>
    </linearGradient>
    <radialGradient id="nto-corner" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0044AA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nto-gap-wall" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00CCFF" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#00CCFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── LARGE TOP BLOCK (takes up 75% of height) ── -->
  <rect x="0" y="0" width="64" height="88" fill="url(#nto-block)"/>

  <!-- Diagonal hazard stripes -->
  <clipPath id="nto-clip">
    <rect x="0" y="0" width="64" height="88"/>
  </clipPath>
  <g clip-path="url(#nto-clip)" opacity="0.15">
    <line x1="-10" y1="0"  x2="22"  y2="88" stroke="url(#nto-stripe)" stroke-width="9"/>
    <line x1="6"   y1="0"  x2="38"  y2="88" stroke="url(#nto-stripe)" stroke-width="9"/>
    <line x1="22"  y1="0"  x2="54"  y2="88" stroke="url(#nto-stripe)" stroke-width="9"/>
    <line x1="38"  y1="0"  x2="70"  y2="88" stroke="url(#nto-stripe)" stroke-width="9"/>
    <line x1="54"  y1="0"  x2="86"  y2="88" stroke="url(#nto-stripe)" stroke-width="9"/>
  </g>

  <!-- Block structural details -->
  <rect x="0" y="0" width="64" height="88" fill="none" stroke="#0088CC" stroke-width="1.2" opacity="0.7"/>
  <!-- Inner beveled frame -->
  <rect x="4" y="4" width="56" height="80" fill="none" stroke="#005588" stroke-width="0.7" opacity="0.45"/>

  <!-- Panel subdivisions (horizontal rails) -->
  <line x1="4" y1="22" x2="60" y2="22" stroke="#0066AA" stroke-width="0.7" opacity="0.4"/>
  <line x1="4" y1="44" x2="60" y2="44" stroke="#0066AA" stroke-width="0.7" opacity="0.4"/>
  <line x1="4" y1="66" x2="60" y2="66" stroke="#0066AA" stroke-width="0.7" opacity="0.4"/>
  <!-- Vertical center split -->
  <line x1="32" y1="4" x2="32" y2="84" stroke="#004477" stroke-width="0.6" opacity="0.3"/>

  <!-- Rivets / bolts -->
  <circle cx="8"  cy="8"  r="2.5" fill="#002244" stroke="#0099DD" stroke-width="0.9" opacity="0.9"/>
  <circle cx="56" cy="8"  r="2.5" fill="#002244" stroke="#0099DD" stroke-width="0.9" opacity="0.9"/>
  <circle cx="8"  cy="80" r="2.5" fill="#002244" stroke="#0099DD" stroke-width="0.9" opacity="0.9"/>
  <circle cx="56" cy="80" r="2.5" fill="#002244" stroke="#0099DD" stroke-width="0.9" opacity="0.9"/>
  <circle cx="32" cy="8"  r="2"   fill="#002244" stroke="#0088CC" stroke-width="0.8" opacity="0.7"/>
  <circle cx="32" cy="80" r="2"   fill="#002244" stroke="#0088CC" stroke-width="0.8" opacity="0.7"/>
  <circle cx="8"  cy="44" r="2"   fill="#002244" stroke="#0088CC" stroke-width="0.8" opacity="0.7"/>
  <circle cx="56" cy="44" r="2"   fill="#002244" stroke="#0088CC" stroke-width="0.8" opacity="0.7"/>

  <!-- Warning icon in block center -->
  <polygon points="32,24 42,40 22,40" fill="none" stroke="#FFD700" stroke-width="1.2" opacity="0.45"/>
  <line x1="32" y1="28" x2="32" y2="35" stroke="#FFD700" stroke-width="1" opacity="0.45"/>
  <circle cx="32" cy="38" r="1" fill="#FFD700" opacity="0.45"/>

  <!-- Glowing bottom danger face (vertical gradient toward gap) -->
  <rect x="0" y="66" width="64" height="22" fill="url(#nto-danger-face)"/>

  <!-- Sharp bottom edge glow line -->
  <line x1="0" y1="88" x2="64" y2="88" stroke="#00CCFF" stroke-width="2.5" opacity="0.95" filter="url(#nto-edge-glow)"/>

  <!-- Corner glow emitters at bottom corners -->
  <circle cx="0"  cy="88" r="8" fill="url(#nto-corner)" opacity="0.85"/>
  <circle cx="64" cy="88" r="8" fill="url(#nto-corner)" opacity="0.85"/>

  <!-- Downward-pointing edge teeth (hazard micro-spikes on bottom face) -->
  <polygon points="10,88 16,95 22,88" fill="#002244" stroke="#00AAFF" stroke-width="0.8" opacity="0.8"/>
  <polygon points="26,88 32,95 38,88" fill="#002244" stroke="#00AAFF" stroke-width="0.8" opacity="0.8"/>
  <polygon points="42,88 48,95 54,88" fill="#002244" stroke="#00AAFF" stroke-width="0.8" opacity="0.8"/>

  <!-- ── NARROW PASSAGE ZONE (bottom strip, ~27px tall) ── -->
  <!-- Left wall of passage -->
  <rect x="0" y="88" width="3" height="32" fill="url(#nto-gap-wall)" opacity="0.7" filter="url(#nto-edge-glow)"/>
  <!-- Right wall of passage -->
  <rect x="61" y="88" width="3" height="32" fill="#00CCFF" opacity="0.0"/>
  <!-- Mirror gradient for right -->
  <rect x="61" y="88" width="3" height="32" fill="#00CCFF" opacity="0.5" filter="url(#nto-edge-glow)"/>

  <!-- Passage floor glow -->
  <line x1="0" y1="120" x2="64" y2="120" stroke="#00CCFF" stroke-width="1.5" opacity="0.5" filter="url(#nto-glow)"/>

  <!-- Passage ambient fill -->
  <rect x="3" y="88" width="58" height="32" fill="#001133" opacity="0.3"/>

  <!-- Passage speed/guide lines (show direction of travel) -->
  <line x1="8"  y1="104" x2="56" y2="104" stroke="#0055AA" stroke-width="0.5" stroke-dasharray="6 4" opacity="0.4"/>
  <line x1="8"  y1="112" x2="56" y2="112" stroke="#004499" stroke-width="0.4" stroke-dasharray="4 6" opacity="0.3"/>
</svg>
