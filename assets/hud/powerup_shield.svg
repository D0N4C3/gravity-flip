<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- SHIELD POWER-UP -->
  <defs>
    <filter id="shield-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="shield-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0044AA" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#001133" stop-opacity="0.9"/>
    </radialGradient>
    <linearGradient id="shield-face" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#4499FF"/>
      <stop offset="100%" stop-color="#0055CC"/>
    </linearGradient>
  </defs>

  <!-- Outer pulse ring -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="#4499FF" stroke-width="1" opacity="0.4" filter="url(#shield-glow)"/>

  <!-- Background -->
  <circle cx="24" cy="24" r="20" fill="url(#shield-bg)"/>

  <!-- Shield shape -->
  <path d="M24 8 L36 13 L36 26 C36 34 24 40 24 40 C24 40 12 34 12 26 L12 13 Z" fill="url(#shield-face)" filter="url(#shield-glow)"/>

  <!-- Shield inner sheen -->
  <path d="M24 10 L34 15 L34 16 L24 11 L14 16 L14 15 Z" fill="#FFFFFF" opacity="0.4"/>
  <path d="M16 18 L16 26 C16 32 24 37 24 37 C24 37 16 32 16 26 L16 18" fill="#FFFFFF" opacity="0.15"/>

  <!-- Cross emblem -->
  <rect x="21" y="18" width="6" height="14" rx="1.5" fill="#FFFFFF" opacity="0.9"/>
  <rect x="17" y="22" width="14" height="6" rx="1.5" fill="#FFFFFF" opacity="0.9"/>

  <!-- Energy arcs -->
  <path d="M10 24 C10 14 18 8 24 8" fill="none" stroke="#4499FF" stroke-width="1" opacity="0.5" stroke-dasharray="2 2"/>
  <path d="M38 24 C38 14 30 8 24 8" fill="none" stroke="#88CCFF" stroke-width="1" opacity="0.5" stroke-dasharray="2 2"/>
</svg>
