<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="r-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="r-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="r-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00EEFF"/>
      <stop offset="50%" stop-color="#0088FF"/>
      <stop offset="100%" stop-color="#0044CC"/>
    </linearGradient>
    <linearGradient id="r-visor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001428"/>
      <stop offset="100%" stop-color="#002244"/>
    </linearGradient>
    <linearGradient id="r-streak1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00EEFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00EEFF" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="r-streak2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0088FF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0088FF" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="r-eye" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#00EEFF"/>
      <stop offset="100%" stop-color="#0044CC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00EEFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00EEFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Motion streaks behind (left side) -->
  <rect x="2" y="24" width="18" height="2.5" rx="1.25" fill="url(#r-streak1)" opacity="0.8"/>
  <rect x="4" y="30" width="14" height="2" rx="1" fill="url(#r-streak1)" opacity="0.6"/>
  <rect x="2" y="36" width="18" height="2.5" rx="1.25" fill="url(#r-streak2)" opacity="0.7"/>
  <rect x="5" y="42" width="12" height="1.5" rx="0.75" fill="url(#r-streak2)" opacity="0.4"/>

  <!-- Outer ambient glow -->
  <rect x="12" y="10" width="44" height="46" rx="8" fill="#00EEFF" opacity="0.07" filter="url(#r-glow)"/>

  <!-- Body — aerodynamic wedge shape -->
  <path d="M18 12 L58 14 L58 52 L18 54 L12 33 Z" fill="url(#r-body)" filter="url(#r-soft)" rx="6"/>

  <!-- Visor panel -->
  <path d="M22 18 L54 19 L54 47 L22 48 L17 33 Z" fill="url(#r-visor)"/>

  <!-- Speed stripe top -->
  <path d="M18 18 L54 19 L54 22 L18 21 Z" fill="#00EEFF" opacity="0.5"/>

  <!-- Speed stripe bottom -->
  <path d="M18 45 L54 44 L54 47 L18 48 Z" fill="#00EEFF" opacity="0.3"/>

  <!-- Horizontal speed lines inside visor -->
  <line x1="22" y1="27" x2="52" y2="27.5" stroke="#00EEFF" stroke-width="0.5" opacity="0.3"/>
  <line x1="22" y1="33" x2="52" y2="33" stroke="#00EEFF" stroke-width="0.5" opacity="0.2"/>
  <line x1="22" y1="39" x2="52" y2="38.5" stroke="#00EEFF" stroke-width="0.5" opacity="0.3"/>

  <!-- Single large visor eye / sensor -->
  <ellipse cx="38" cy="33" rx="10" ry="7" fill="url(#r-eye)" filter="url(#r-soft)"/>
  <ellipse cx="38" cy="33" rx="5" ry="3.5" fill="#FFFFFF" opacity="0.9"/>
  <ellipse cx="38" cy="33" rx="2" ry="1.5" fill="#00EEFF"/>
  <!-- Lens glint -->
  <ellipse cx="35" cy="31" rx="1.5" ry="1" fill="#FFFFFF" opacity="0.8"/>

  <!-- Front edge neon outline -->
  <path d="M18 12 L12 33 L18 54" fill="none" stroke="#00EEFF" stroke-width="2" opacity="0.9" filter="url(#r-soft)"/>

  <!-- Top/bottom edge lines -->
  <path d="M18 12 L58 14" fill="none" stroke="#00EEFF" stroke-width="1" opacity="0.6"/>
  <path d="M18 54 L58 52" fill="none" stroke="#00EEFF" stroke-width="1" opacity="0.6"/>

  <!-- Back thruster vents -->
  <rect x="55" y="17" width="4" height="5" rx="2" fill="#00EEFF" opacity="0.8" filter="url(#r-soft)"/>
  <rect x="55" y="25" width="4" height="5" rx="2" fill="#00EEFF" opacity="0.6" filter="url(#r-soft)"/>
  <rect x="55" y="33" width="4" height="5" rx="2" fill="#00EEFF" opacity="0.8" filter="url(#r-soft)"/>
  <rect x="55" y="41" width="4" height="5" rx="2" fill="#00EEFF" opacity="0.6" filter="url(#r-soft)"/>

  <!-- Nose tip glow -->
  <circle cx="12" cy="33" r="3" fill="#00EEFF" opacity="0.9" filter="url(#r-glow)"/>
</svg>
