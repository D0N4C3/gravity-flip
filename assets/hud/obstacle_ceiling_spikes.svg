<svg width="80" height="48" viewBox="0 0 80 48" xmlns="http://www.w3.org/2000/svg">
  <!-- CEILING SPIKE CLUSTER - hangs from top surface -->
  <defs>
    <filter id="cspike-glow" x="-30%" y="-30%" width="160%" height="200%">
      <feGaussianBlur stdDeviation="2 3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="cspike-body" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#AA00FF"/>
      <stop offset="70%" stop-color="#CC44FF"/>
      <stop offset="100%" stop-color="#EECCFF"/>
    </linearGradient>
    <linearGradient id="cspike-body2" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#8800CC"/>
      <stop offset="70%" stop-color="#AA33EE"/>
      <stop offset="100%" stop-color="#CC99FF"/>
    </linearGradient>
    <linearGradient id="cspike-base" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#550088"/>
      <stop offset="100%" stop-color="#2A0044"/>
    </linearGradient>
  </defs>

  <!-- Ceiling base plate -->
  <rect x="0" y="0" width="80" height="8" fill="url(#cspike-base)" opacity="0.8"/>
  <line x1="0" y1="8" x2="80" y2="8" stroke="#AA00FF" stroke-width="1" opacity="0.8" filter="url(#cspike-glow)"/>

  <!-- Side small spikes (inverted) -->
  <polygon points="5,8 12,33 19,8" fill="url(#cspike-body2)" filter="url(#cspike-glow)"/>
  <polygon points="61,8 68,33 75,8" fill="url(#cspike-body2)" filter="url(#cspike-glow)"/>

  <!-- Main center spike (longest, pointing down) -->
  <polygon points="30,8 40,44 50,8" fill="url(#cspike-body)" filter="url(#cspike-glow)"/>

  <!-- Medium flanking spikes -->
  <polygon points="16,8 25,30 34,8" fill="url(#cspike-body)" filter="url(#cspike-glow)"/>
  <polygon points="46,8 55,30 64,8" fill="url(#cspike-body)" filter="url(#cspike-glow)"/>

  <!-- Tip glow dots -->
  <circle cx="40" cy="43" r="2.5" fill="#FFFFFF" filter="url(#cspike-glow)" opacity="0.9"/>
  <circle cx="25" cy="29" r="1.8" fill="#EECCFF" filter="url(#cspike-glow)" opacity="0.8"/>
  <circle cx="55" cy="29" r="1.8" fill="#EECCFF" filter="url(#cspike-glow)" opacity="0.8"/>
  <circle cx="12" cy="32" r="1.2" fill="#CC44FF" filter="url(#cspike-glow)" opacity="0.7"/>
  <circle cx="68" cy="32" r="1.2" fill="#CC44FF" filter="url(#cspike-glow)" opacity="0.7"/>

  <!-- Spike edge highlights -->
  <line x1="30" y1="8" x2="40" y2="44" stroke="#EECCFF" stroke-width="0.8" opacity="0.6"/>
  <line x1="16" y1="8" x2="25" y2="30" stroke="#EECCFF" stroke-width="0.5" opacity="0.5"/>
  <line x1="46" y1="8" x2="55" y2="30" stroke="#EECCFF" stroke-width="0.5" opacity="0.5"/>

  <!-- Ceiling drip glow -->
  <ellipse cx="40" cy="8" rx="35" ry="4" fill="#AA00FF" opacity="0.12" filter="url(#cspike-glow)"/>

  <!-- Drip details -->
  <path d="M40 8 L40 44" stroke="#CC44FF" stroke-width="0.3" opacity="0.2"/>
</svg>
