<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="x2-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="x2-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#443300" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#110800" stop-opacity="0.9"/>
    </radialGradient>
    <linearGradient id="x2-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE000"/>
      <stop offset="100%" stop-color="#FF8800"/>
    </linearGradient>
  </defs>

  <!-- Rotating star burst -->
  <g filter="url(#x2-glow)" opacity="0.5">
    <line x1="24" y1="3" x2="24" y2="9" stroke="#FFE000" stroke-width="1.5"/>
    <line x1="38" y1="7" x2="35" y2="12" stroke="#FFE000" stroke-width="1.5"/>
    <line x1="45" y1="18" x2="40" y2="20" stroke="#FFE000" stroke-width="1.5"/>
    <line x1="45" y1="30" x2="40" y2="28" stroke="#FFE000" stroke-width="1.5"/>
    <line x1="38" y1="41" x2="35" y2="36" stroke="#FFE000" stroke-width="1.5"/>
    <line x1="24" y1="45" x2="24" y2="39" stroke="#FFE000" stroke-width="1.5"/>
    <line x1="10" y1="41" x2="13" y2="36" stroke="#FFE000" stroke-width="1.5"/>
    <line x1="3" y1="30" x2="8" y2="28" stroke="#FFE000" stroke-width="1.5"/>
    <line x1="3" y1="18" x2="8" y2="20" stroke="#FFE000" stroke-width="1.5"/>
    <line x1="10" y1="7" x2="13" y2="12" stroke="#FFE000" stroke-width="1.5"/>
  </g>

  <!-- Background circle -->
  <circle cx="24" cy="24" r="20" fill="url(#x2-bg)"/>
  <circle cx="24" cy="24" r="20" fill="none" stroke="#FFE000" stroke-width="1.5" opacity="0.6" filter="url(#x2-glow)"/>

  <!-- x2 text bold -->
  <text x="24" y="30" font-family="Arial Black, sans-serif" font-size="20" font-weight="900"
        fill="url(#x2-grad)" text-anchor="middle" filter="url(#x2-glow)">x2</text>

  <!-- Coin orbiting -->
  <circle cx="40" cy="14" r="4" fill="#FFE000" filter="url(#x2-glow)"/>
  <circle cx="40" cy="14" r="2.5" fill="#FFA500"/>
  <text x="40" y="17" font-family="Arial" font-size="4" fill="#FFFFFF" font-weight="bold" text-anchor="middle">$</text>

  <!-- Shadow coin (doubled) -->
  <circle cx="43" cy="12" r="3.5" fill="none" stroke="#FFE000" stroke-width="1" opacity="0.5"/>

  <!-- Small sparkles -->
  <path d="M8 10 L9 8 L10 10 L8 11 Z" fill="#FFE000" opacity="0.7" filter="url(#x2-glow)"/>
  <path d="M38 36 L39 34 L40 36 L38 37 Z" fill="#FF8800" opacity="0.7" filter="url(#x2-glow)"/>
  <path d="M6 34 L7 32 L8 34 L6 35 Z" fill="#FFE000" opacity="0.6"/>
</svg>
