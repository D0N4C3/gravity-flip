<svg width="24" height="120" viewBox="0 0 24 120" xmlns="http://www.w3.org/2000/svg">
  <!-- LASER GATE - vertical beam with emitters top and bottom -->
  <defs>
    <filter id="laser-glow" x="-200%" y="-10%" width="500%" height="120%">
      <feGaussianBlur stdDeviation="4 1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="emitter-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="laser-beam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF0088" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#FF00AA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="70%" stop-color="#FF00AA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF0088" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="emitter-light" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#FF00AA"/>
      <stop offset="100%" stop-color="#880044"/>
    </radialGradient>
  </defs>

  <!-- Top emitter housing -->
  <rect x="4" y="0" width="16" height="20" rx="3" fill="#1A0010"/>
  <rect x="4" y="0" width="16" height="20" rx="3" fill="none" stroke="#FF0088" stroke-width="1" opacity="0.8"/>
  <!-- Emitter grill lines -->
  <line x1="7" y1="4" x2="17" y2="4" stroke="#FF0088" stroke-width="0.8" opacity="0.5"/>
  <line x1="7" y1="8" x2="17" y2="8" stroke="#FF0088" stroke-width="0.8" opacity="0.5"/>
  <line x1="7" y1="12" x2="17" y2="12" stroke="#FF0088" stroke-width="0.8" opacity="0.5"/>
  <!-- Emitter nozzle -->
  <rect x="9" y="16" width="6" height="6" rx="1" fill="#330011"/>
  <circle cx="12" cy="19" r="3" fill="url(#emitter-light)" filter="url(#emitter-glow)"/>

  <!-- Bottom emitter housing -->
  <rect x="4" y="100" width="16" height="20" rx="3" fill="#1A0010"/>
  <rect x="4" y="100" width="16" height="20" rx="3" fill="none" stroke="#FF0088" stroke-width="1" opacity="0.8"/>
  <line x1="7" y1="108" x2="17" y2="108" stroke="#FF0088" stroke-width="0.8" opacity="0.5"/>
  <line x1="7" y1="112" x2="17" y2="112" stroke="#FF0088" stroke-width="0.8" opacity="0.5"/>
  <line x1="7" y1="116" x2="17" y2="116" stroke="#FF0088" stroke-width="0.8" opacity="0.5"/>
  <rect x="9" y="98" width="6" height="6" rx="1" fill="#330011"/>
  <circle cx="12" cy="101" r="3" fill="url(#emitter-light)" filter="url(#emitter-glow)"/>

  <!-- Laser beam (outer soft glow) -->
  <rect x="9" y="22" width="6" height="76" fill="#FF0088" opacity="0.08" filter="url(#laser-glow)"/>

  <!-- Laser beam core -->
  <rect x="11" y="22" width="2" height="76" fill="url(#laser-beam)" filter="url(#laser-glow)"/>

  <!-- Beam center white hot -->
  <rect x="11.5" y="22" width="1" height="76" fill="#FFFFFF" opacity="0.7"/>

  <!-- Energy nodes along beam -->
  <circle cx="12" cy="40" r="2.5" fill="#FF00AA" opacity="0.8" filter="url(#laser-glow)"/>
  <circle cx="12" cy="60" r="2.5" fill="#FFFFFF" opacity="0.9" filter="url(#laser-glow)"/>
  <circle cx="12" cy="80" r="2.5" fill="#FF00AA" opacity="0.8" filter="url(#laser-glow)"/>

  <!-- Warning triangles on emitters -->
  <path d="M7 6 L12 2 L17 6 Z" fill="#FF0088" opacity="0.4"/>
  <path d="M7 114 L12 118 L17 114 Z" fill="#FF0088" opacity="0.4"/>
</svg>
