<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="inner-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="100%" stop-color="#0080FF"/>
    </linearGradient>
    <linearGradient id="face-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001830"/>
      <stop offset="100%" stop-color="#002850"/>
    </linearGradient>
    <radialGradient id="eye-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#00F5FF"/>
      <stop offset="100%" stop-color="#0080FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer glow halo -->
  <rect x="6" y="6" width="52" height="52" rx="14" fill="none" stroke="#00F5FF" stroke-width="1.5" opacity="0.3" filter="url(#glow-cyan)"/>

  <!-- Body shell -->
  <rect x="10" y="10" width="44" height="44" rx="12" fill="url(#body-grad)" filter="url(#glow-cyan)"/>

  <!-- Inner face panel -->
  <rect x="14" y="14" width="36" height="36" rx="9" fill="url(#face-grad)"/>

  <!-- Top accent stripe -->
  <rect x="14" y="14" width="36" height="4" rx="2" fill="#00F5FF" opacity="0.5"/>

  <!-- Eyes -->
  <circle cx="24" cy="30" r="5" fill="url(#eye-glow)" filter="url(#inner-glow)"/>
  <circle cx="40" cy="30" r="5" fill="url(#eye-glow)" filter="url(#inner-glow)"/>
  <!-- Eye pupils -->
  <circle cx="24" cy="30" r="2" fill="#FFFFFF"/>
  <circle cx="40" cy="30" r="2" fill="#FFFFFF"/>

  <!-- Visor line -->
  <line x1="14" y1="38" x2="50" y2="38" stroke="#00F5FF" stroke-width="0.5" opacity="0.4"/>

  <!-- Bottom thruster vents -->
  <rect x="18" y="47" width="8" height="3" rx="1.5" fill="#00F5FF" opacity="0.6"/>
  <rect x="28" y="47" width="8" height="3" rx="1.5" fill="#00F5FF" opacity="0.6"/>
  <rect x="38" y="47" width="8" height="3" rx="1.5" fill="#00F5FF" opacity="0.6"/>

  <!-- Corner accent marks -->
  <path d="M10 20 L10 14 L16 14" fill="none" stroke="#00F5FF" stroke-width="1.5" opacity="0.8"/>
  <path d="M54 20 L54 14 L48 14" fill="none" stroke="#00F5FF" stroke-width="1.5" opacity="0.8"/>
  <path d="M10 44 L10 50 L16 50" fill="none" stroke="#00F5FF" stroke-width="1.5" opacity="0.8"/>
  <path d="M54 44 L54 50 L48 50" fill="none" stroke="#00F5FF" stroke-width="1.5" opacity="0.8"/>
</svg>
