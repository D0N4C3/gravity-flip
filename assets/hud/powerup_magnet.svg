<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- MAGNET POWER-UP -->
  <defs>
    <filter id="mag-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="mag-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#440044" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#110011" stop-opacity="0.9"/>
    </radialGradient>
  </defs>

  <!-- Attraction field rings -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="#FF44FF" stroke-width="0.5" opacity="0.2" stroke-dasharray="3 3"/>
  <circle cx="24" cy="24" r="17" fill="none" stroke="#FF44FF" stroke-width="0.5" opacity="0.3" stroke-dasharray="2 4"/>
  <circle cx="24" cy="24" r="12" fill="none" stroke="#FF44FF" stroke-width="0.5" opacity="0.4" stroke-dasharray="1 3"/>

  <!-- Background -->
  <circle cx="24" cy="24" r="20" fill="url(#mag-bg)"/>

  <!-- Horseshoe magnet shape -->
  <!-- Right arm -->
  <path d="M28 14 L28 26 C28 30 24 32 24 32 C24 32 20 30 20 26 L20 14" fill="none" stroke="#FF44FF" stroke-width="4" stroke-linecap="round" filter="url(#mag-glow)"/>
  <!-- Top bar -->
  <rect x="18" y="11" width="12" height="5" rx="2.5" fill="#FF44FF" filter="url(#mag-glow)"/>

  <!-- Polarity tips -->
  <rect x="18" y="26" width="4" height="6" rx="1" fill="#FF2200" filter="url(#mag-glow)"/>
  <rect x="26" y="26" width="4" height="6" rx="1" fill="#2222FF" filter="url(#mag-glow)"/>

  <!-- N / S labels -->
  <text x="19.5" y="31" font-family="monospace" font-size="4" fill="#FFFFFF" font-weight="bold">N</text>
  <text x="27.5" y="31" font-family="monospace" font-size="4" fill="#FFFFFF" font-weight="bold">S</text>

  <!-- Attraction particle arcs -->
  <path d="M8 30 C10 26 14 24 18 26" fill="none" stroke="#FF44FF" stroke-width="0.8" opacity="0.5" stroke-dasharray="1 2"/>
  <path d="M40 30 C38 26 34 24 30 26" fill="none" stroke="#4444FF" stroke-width="0.8" opacity="0.5" stroke-dasharray="1 2"/>
  <!-- Flying coin dots being attracted -->
  <circle cx="10" cy="28" r="1.5" fill="#FFE000" opacity="0.8" filter="url(#mag-glow)"/>
  <circle cx="38" cy="28" r="1.5" fill="#FFE000" opacity="0.8" filter="url(#mag-glow)"/>
  <circle cx="12" cy="22" r="1" fill="#FFE000" opacity="0.5"/>
  <circle cx="36" cy="22" r="1" fill="#FFE000" opacity="0.5"/>
</svg>
