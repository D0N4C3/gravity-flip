<svg width="48" height="120" viewBox="0 0 48 120" xmlns="http://www.w3.org/2000/svg">
  <!-- NARROW TUNNEL FRAME - corridor constriction, forces precise flip -->
  <!-- Neon blue / cyan with warning accents -->
  <defs>
    <filter id="nt-glow" x="-40%" y="-20%" width="180%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="nt-edge-glow" x="-80%" y="-30%" width="260%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="nt-gap-glow" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="nt-block-top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#001122"/>
      <stop offset="40%" stop-color="#003366"/>
      <stop offset="100%" stop-color="#001133"/>
    </linearGradient>
    <linearGradient id="nt-block-bot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#001122"/>
      <stop offset="40%" stop-color="#003366"/>
      <stop offset="100%" stop-color="#001133"/>
    </linearGradient>
    <linearGradient id="nt-gap-fill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0044AA" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#00AAFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0044AA" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="nt-stripe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FF8800" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="nt-corner-light" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00CCFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0044AA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── TOP BLOCKER BLOCK ── -->
  <rect x="0" y="0" width="48" height="44" fill="url(#nt-block-top)"/>

  <!-- Hazard diagonal stripes on top block -->
  <clipPath id="clip-top">
    <rect x="0" y="0" width="48" height="44"/>
  </clipPath>
  <g clip-path="url(#clip-top)" opacity="0.18">
    <line x1="-8" y1="0"  x2="16"  y2="44" stroke="url(#nt-stripe)" stroke-width="7"/>
    <line x1="4"  y1="0"  x2="28"  y2="44" stroke="url(#nt-stripe)" stroke-width="7"/>
    <line x1="16" y1="0"  x2="40"  y2="44" stroke="url(#nt-stripe)" stroke-width="7"/>
    <line x1="28" y1="0"  x2="52"  y2="44" stroke="url(#nt-stripe)" stroke-width="7"/>
    <line x1="40" y1="0"  x2="64"  y2="44" stroke="url(#nt-stripe)" stroke-width="7"/>
  </g>

  <!-- Top block border -->
  <rect x="0" y="0" width="48" height="44" fill="none" stroke="#0088CC" stroke-width="1" opacity="0.7"/>
  <!-- Interior panel inset -->
  <rect x="3" y="3" width="42" height="38" fill="none" stroke="#0066AA" stroke-width="0.6" opacity="0.4"/>

  <!-- Rivet / bolt accents on top block -->
  <circle cx="6"  cy="6"  r="2" fill="#003366" stroke="#00AAFF" stroke-width="0.8" opacity="0.8"/>
  <circle cx="42" cy="6"  r="2" fill="#003366" stroke="#00AAFF" stroke-width="0.8" opacity="0.8"/>
  <circle cx="6"  cy="38" r="2" fill="#003366" stroke="#00AAFF" stroke-width="0.8" opacity="0.8"/>
  <circle cx="42" cy="38" r="2" fill="#003366" stroke="#00AAFF" stroke-width="0.8" opacity="0.8"/>
  <!-- Center logo/icon area on top block -->
  <rect x="17" y="14" width="14" height="16" rx="2" fill="#001A44" stroke="#0088CC" stroke-width="0.8" opacity="0.6"/>
  <!-- Skull/warning symbol approximation -->
  <line x1="24" y1="16" x2="24" y2="28" stroke="#00CCFF" stroke-width="0.6" opacity="0.5"/>
  <line x1="19" y1="22" x2="29" y2="22" stroke="#00CCFF" stroke-width="0.6" opacity="0.5"/>

  <!-- Glowing bottom edge of top block (faces the gap) -->
  <line x1="0" y1="44" x2="48" y2="44" stroke="#00CCFF" stroke-width="2" opacity="0.9" filter="url(#nt-edge-glow)"/>
  <!-- Corner glow spots at gap entrance corners -->
  <circle cx="0"  cy="44" r="6" fill="url(#nt-corner-light)" opacity="0.9"/>
  <circle cx="48" cy="44" r="6" fill="url(#nt-corner-light)" opacity="0.9"/>

  <!-- Inward-pointing hazard teeth at gap top -->
  <polygon points="8,44 14,50 20,44"  fill="#003366" stroke="#00AAFF" stroke-width="0.7" opacity="0.7"/>
  <polygon points="28,44 34,50 40,44" fill="#003366" stroke="#00AAFF" stroke-width="0.7" opacity="0.7"/>

  <!-- ── GAP / PASSAGE ZONE ── -->
  <rect x="0" y="44" width="48" height="32" fill="url(#nt-gap-fill)"/>

  <!-- Gap guide lines (show the safe corridor) -->
  <line x1="0" y1="44" x2="0"  y2="76" stroke="#00CCFF" stroke-width="1.5" opacity="0.5" filter="url(#nt-gap-glow)"/>
  <line x1="47" y1="44" x2="47" y2="76" stroke="#00CCFF" stroke-width="1.5" opacity="0.5" filter="url(#nt-gap-glow)"/>

  <!-- Danger zone center marker -->
  <line x1="0" y1="60" x2="48" y2="60" stroke="#00AAFF" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- Tight warning indicators in gap -->
  <circle cx="4"  cy="60" r="2.5" fill="#00CCFF" opacity="0.25" filter="url(#nt-glow)"/>
  <circle cx="44" cy="60" r="2.5" fill="#00CCFF" opacity="0.25" filter="url(#nt-glow)"/>

  <!-- ── BOTTOM BLOCKER BLOCK ── -->
  <rect x="0" y="76" width="48" height="44" fill="url(#nt-block-bot)"/>

  <!-- Hazard diagonal stripes on bottom block -->
  <clipPath id="clip-bot">
    <rect x="0" y="76" width="48" height="44"/>
  </clipPath>
  <g clip-path="url(#clip-bot)" opacity="0.18">
    <line x1="-8" y1="76" x2="16"  y2="120" stroke="url(#nt-stripe)" stroke-width="7"/>
    <line x1="4"  y1="76" x2="28"  y2="120" stroke="url(#nt-stripe)" stroke-width="7"/>
    <line x1="16" y1="76" x2="40"  y2="120" stroke="url(#nt-stripe)" stroke-width="7"/>
    <line x1="28" y1="76" x2="52"  y2="120" stroke="url(#nt-stripe)" stroke-width="7"/>
    <line x1="40" y1="76" x2="64"  y2="120" stroke="url(#nt-stripe)" stroke-width="7"/>
  </g>

  <!-- Bottom block border -->
  <rect x="0" y="76" width="48" height="44" fill="none" stroke="#0088CC" stroke-width="1" opacity="0.7"/>
  <rect x="3" y="79" width="42" height="38" fill="none" stroke="#0066AA" stroke-width="0.6" opacity="0.4"/>

  <!-- Rivets on bottom block -->
  <circle cx="6"  cy="82"  r="2" fill="#003366" stroke="#00AAFF" stroke-width="0.8" opacity="0.8"/>
  <circle cx="42" cy="82"  r="2" fill="#003366" stroke="#00AAFF" stroke-width="0.8" opacity="0.8"/>
  <circle cx="6"  cy="114" r="2" fill="#003366" stroke="#00AAFF" stroke-width="0.8" opacity="0.8"/>
  <circle cx="42" cy="114" r="2" fill="#003366" stroke="#00AAFF" stroke-width="0.8" opacity="0.8"/>
  <!-- Center icon area on bottom block -->
  <rect x="17" y="90" width="14" height="16" rx="2" fill="#001A44" stroke="#0088CC" stroke-width="0.8" opacity="0.6"/>
  <line x1="24" y1="92" x2="24" y2="104" stroke="#00CCFF" stroke-width="0.6" opacity="0.5"/>
  <line x1="19" y1="98" x2="29" y2="98" stroke="#00CCFF" stroke-width="0.6" opacity="0.5"/>

  <!-- Glowing top edge of bottom block (faces the gap) -->
  <line x1="0" y1="76" x2="48" y2="76" stroke="#00CCFF" stroke-width="2" opacity="0.9" filter="url(#nt-edge-glow)"/>
  <!-- Corner glow spots -->
  <circle cx="0"  cy="76" r="6" fill="url(#nt-corner-light)" opacity="0.9"/>
  <circle cx="48" cy="76" r="6" fill="url(#nt-corner-light)" opacity="0.9"/>

  <!-- Inward-pointing hazard teeth at gap bottom -->
  <polygon points="8,76 14,70 20,76"  fill="#003366" stroke="#00AAFF" stroke-width="0.7" opacity="0.7"/>
  <polygon points="28,76 34,70 40,76" fill="#003366" stroke="#00AAFF" stroke-width="0.7" opacity="0.7"/>
</svg>
